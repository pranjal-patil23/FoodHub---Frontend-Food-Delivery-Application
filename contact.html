<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - Foodie</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar">
        <div class="logo">Foodie</div>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="index.html#menu">Menu</a></li>
            <li><a href="about.html">About</a></li>
            <li><a href="contact.html">Contact</a></li>
            <li><a href="login.html">Login</a></li>
        </ul>
    </nav>

    <!-- Hero Banner -->
    <section class="hero" style="padding:100px 20px; text-align:center; background-image:url('https://images.pexels.com/photos/70497/pexels-photo-70497.jpeg?auto=compress&cs=tinysrgb&w=1200'); background-size:cover; color:white;">
        <h1>Contact Foodie</h1>
        <p>We'd love to hear from you!</p>
    </section>

    <!-- Contact Info & Form -->
    <section style="padding:50px 20px; display:flex; flex-wrap:wrap; justify-content:center; gap:50px;">
        <!-- Contact Info -->
        <div style="flex:1 1 300px; max-width:350px; background:#fff3e0; padding:30px; border-radius:10px; box-shadow:0 0 10px #ccc;">
            <h2>Get in Touch</h2>
            <p><i class="fas fa-envelope"></i> Email: contact@foodie.com</p>
            <p><i class="fas fa-phone"></i> Phone: +91 12345 67890</p>
            <p><i class="fas fa-map-marker-alt"></i> Address: 123 Food Street, Mumbai, India</p>
        </div>

        <!-- Contact Form -->
        <div style="flex:1 1 300px; max-width:350px; background:#fff; padding:30px; border-radius:10px; box-shadow:0 0 10px #ccc;">
            <h2>Send a Message</h2>
            <form>
                <input type="text" placeholder="Name" style="width:100%;padding:10px;margin:10px 0;">
                <input type="email" placeholder="Email" style="width:100%;padding:10px;margin:10px 0;">
                <textarea placeholder="Message" style="width:100%;padding:10px;margin:10px 0;"></textarea>
                <button type="submit" style="padding:10px 20px;background-color:#ff6b01;color:white;border:none;border-radius:5px;cursor:pointer;">Send</button>
            </form>
        </div>
    </section>

    <!-- Footer -->
    <footer>
        <p>© 2025 Foodie. All rights reserved.</p>
        <div class="socials">
            <a href="#">Instagram</a> | <a href="#">Facebook</a> | <a href="#">Twitter</a>
        </div>
    </footer>
</body>
</html>
